<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Horoscope ✨</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

    :root {
      --bg: #0a0a1a;
      --card-bg: #0f0f2a;
      --card-border: #2a2a5a;
      --accent: #9b6dff;
      --accent2: #ff6db3;
      --gold: #ffd700;
      --text: #e0e0ff;
      --muted: #8888aa;
      --prophecy-bg: #1a0a2e;
      --prophecy-border: #9b6dff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(155,109,255,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255,109,179,0.06) 0%, transparent 50%);
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    header .subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    #date-display {
      margin-top: 0.6rem;
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      color: var(--gold);
      opacity: 0.85;
    }

    .divider {
      width: 160px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 1.2rem auto;
    }

    /* ── NO DATA ── */
    #no-data {
      display: none;
      text-align: center;
      padding: 4rem 2rem;
    }
    #no-data .emoji { font-size: 3.5rem; margin-bottom: 1rem; }
    #no-data h2 { font-family: 'Cinzel', serif; color: var(--accent); margin-bottom: 0.75rem; }
    #no-data p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }

    /* ── COMPACT GRID ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      padding: 0 1rem 6rem;
      max-width: 480px;
      margin: 0 auto;
    }

    @media (min-width: 600px) {
      #grid {
        grid-template-columns: repeat(4, 1fr);
        max-width: 720px;
        gap: 1rem;
        padding: 0 1.5rem 4rem;
      }
    }

    @media (min-width: 1024px) {
      #grid {
        grid-template-columns: repeat(6, 1fr);
        max-width: 1200px;
        padding: 0 2rem 4rem;
      }
    }

    /* ── COMPACT CARD ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1rem 0.6rem;
      text-align: center;
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(155,109,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .card:hover, .card:active {
      transform: translateY(-3px);
      border-color: rgba(155,109,255,0.5);
      box-shadow: 0 8px 24px rgba(155,109,255,0.15);
    }

    .card-sign-emoji { font-size: 2rem; margin-bottom: 0.3rem; }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .card-mood-emoji { font-size: 1.1rem; margin-bottom: 0.2rem; }

    .card-mood-text {
      font-size: 0.65rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .bug-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 0.2rem;
    }
    .bug-dot.Low    { background: #4caf7d; }
    .bug-dot.Medium { background: #ffd700; }
    .bug-dot.High   { background: #ff6b6b; }

    .card-tap-hint {
      font-size: 0.58rem;
      color: rgba(155,109,255,0.5);
      margin-top: 0.5rem;
      letter-spacing: 0.05em;
    }

    /* ── MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      padding: 1rem;
      overflow-y: auto;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    #modal {
      background: #0f0f2a;
      border: 1px solid rgba(155,109,255,0.4);
      border-radius: 20px;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      margin: auto;
      position: relative;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--text);
      font-size: 1.1rem;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #modal-close:hover { background: rgba(255,255,255,0.15); }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.2rem;
      padding-right: 2rem;
    }

    .modal-sign-emoji { font-size: 2.5rem; }

    .modal-sign-name {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }

    .modal-sign-dates {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .modal-horoscope {
      font-size: 0.83rem;
      line-height: 1.75;
      color: #b0b0cc;
      font-style: italic;
      border-left: 2px solid rgba(155,109,255,0.4);
      padding-left: 0.75rem;
      margin-bottom: 1rem;
    }

    .modal-card-of-day {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--gold);
      background: rgba(255,215,0,0.08);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
      margin-bottom: 1rem;
    }

    .modal-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }

    .modal-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }

    .info-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 0.6rem 0.7rem;
    }

    .info-box.dev {
      background: rgba(155,109,255,0.05);
      border-color: rgba(155,109,255,0.15);
    }

    .info-label {
      font-size: 0.63rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }

    .info-value {
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 500;
    }

    .mood-row { display: flex; align-items: center; gap: 0.35rem; }

    .colour-dot {
      display: inline-block;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    .stars { display: flex; gap: 2px; }
    .star  { font-size: 0.75rem; }

    .bug-low    { color: #4caf7d; }
    .bug-medium { color: var(--gold); }
    .bug-high   { color: #ff6b6b; }
    .deploy-yes    { color: #4caf7d; }
    .deploy-no     { color: #ff6b6b; }
    .deploy-maybe  { color: var(--gold); }

    /* ── PROPHECY ── */
    .prophecy-box {
      background: var(--prophecy-bg);
      border: 1px solid var(--prophecy-border);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      margin-top: 0.75rem;
      position: relative;
      overflow: hidden;
    }

    .prophecy-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(155,109,255,0.1), transparent);
      pointer-events: none;
    }

    .prophecy-label {
      font-size: 0.65rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .prophecy-text {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
      font-weight: 500;
      position: relative;
      z-index: 1;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--muted);
      font-size: 0.72rem;
    }
  </style>
</head>
<body>

<header>
  <div style="font-size:2.2rem;margin-bottom:0.4rem;">🔮</div>
  <h1>Dev Horoscope</h1>
  <div class="subtitle">The stars know your sprint velocity</div>
  <div id="date-display"></div>
  <div class="divider"></div>
</header>

<div id="no-data">
  <div class="emoji">🌑</div>
  <h2>The Stars Are Silent Today</h2>
  <p>No horoscope data found for today.<br>Mercury is in retrograde. Or someone forgot to run the command.</p>
</div>

<div id="grid"></div>

<footer>✨ Data from the cosmos (and horoscope.com + AstroTalk) · For entertainment purposes only</footer>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
  const SIGNS = [
    { key:'aries',       name:'Aries',       emoji:'♈', dates:'Mar 21 – Apr 19' },
    { key:'taurus',      name:'Taurus',      emoji:'♉', dates:'Apr 20 – May 20' },
    { key:'gemini',      name:'Gemini',      emoji:'♊', dates:'May 21 – Jun 20' },
    { key:'cancer',      name:'Cancer',      emoji:'♋', dates:'Jun 21 – Jul 22' },
    { key:'leo',         name:'Leo',         emoji:'♌', dates:'Jul 23 – Aug 22' },
    { key:'virgo',       name:'Virgo',       emoji:'♍', dates:'Aug 23 – Sep 22' },
    { key:'libra',       name:'Libra',       emoji:'♎', dates:'Sep 23 – Oct 22' },
    { key:'scorpio',     name:'Scorpio',     emoji:'♏', dates:'Oct 23 – Nov 21' },
    { key:'sagittarius', name:'Sagittarius', emoji:'♐', dates:'Nov 22 – Dec 21' },
    { key:'capricorn',   name:'Capricorn',   emoji:'♑', dates:'Dec 22 – Jan 19' },
    { key:'aquarius',    name:'Aquarius',    emoji:'♒', dates:'Jan 20 – Feb 18' },
    { key:'pisces',      name:'Pisces',      emoji:'♓', dates:'Feb 19 – Mar 20' },
  ];

  let horoscopeData = null;

  function stars(n, max=5) {
    return Array.from({length:max},(_,i)=>
      `<span class="star">${i<n?'⭐':'✦'}</span>`
    ).join('');
  }

  function bugClass(l)    { return l==='Low'?'bug-low':l==='High'?'bug-high':'bug-medium'; }
  function deployClass(v) {
    const s = (v||'').toLowerCase();
    return s.startsWith('yes')?'deploy-yes':s.startsWith('no')?'deploy-no':'deploy-maybe';
  }

  function buildCompactCard(sign, s) {
    return `
      <div class="card" onclick="openModal('${sign.key}')">
        <div class="card-sign-emoji">${sign.emoji}</div>
        <div class="card-name">${sign.name}</div>
        <div class="card-mood-emoji">${s.mood_emoji||''}</div>
        <div class="card-mood-text">${s.mood||''}</div>
        <span class="bug-dot ${s.bug_energy}"></span>
        <div class="card-tap-hint">tap to read</div>
      </div>`;
  }

  function buildModal(sign, s) {
    return `
      <div class="modal-header">
        <div class="modal-sign-emoji">${sign.emoji}</div>
        <div>
          <div class="modal-sign-name">${sign.name}</div>
          <div class="modal-sign-dates">${sign.dates}</div>
        </div>
      </div>

      <div class="modal-horoscope">${s.horoscope_text||''}</div>

      ${s.card_of_day?`<div class="modal-card-of-day">🃏 Card of the Day: <strong>${s.card_of_day}</strong></div>`:''}

      <div class="modal-grid-2">
        <div class="info-box">
          <div class="info-label">Mood</div>
          <div class="info-value mood-row"><span>${s.mood_emoji||''}</span><span>${s.mood||''}</span></div>
        </div>
        <div class="info-box">
          <div class="info-label">Lucky Number</div>
          <div class="info-value">🔢 ${s.lucky_number??'?'}</div>
        </div>
        <div class="info-box" style="grid-column:span 2">
          <div class="info-label">Lucky Colour</div>
          <div class="info-value" style="display:flex;align-items:center;gap:0.4rem;">
            <span class="colour-dot" style="background:${s.lucky_colour_hex||'#888'}"></span>
            ${s.lucky_colour||'?'}
          </div>
        </div>
      </div>

      <div class="modal-grid-3">
        <div class="info-box">
          <div class="info-label">Hustle</div>
          <div class="stars">${stars(s.hustle||0)}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Vibe</div>
          <div class="stars">${stars(s.vibe||0)}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Success</div>
          <div class="stars">${stars(s.success||0)}</div>
        </div>
      </div>

      <div class="modal-grid-2">
        <div class="info-box dev">
          <div class="info-label">☕ Coffee Index</div>
          <div class="info-value">${s.coffee_index||'?'} / 5</div>
        </div>
        <div class="info-box dev">
          <div class="info-label">🐛 Bug Energy</div>
          <div class="info-value ${bugClass(s.bug_energy)}">${s.bug_energy||'?'}</div>
        </div>
        <div class="info-box dev" style="grid-column:span 2">
          <div class="info-label">🚀 Deploy Today?</div>
          <div class="info-value ${deployClass(s.deploy_today)}">${s.deploy_today||'?'}</div>
        </div>
      </div>

      <div class="prophecy-box">
        <div class="prophecy-label">🔮 Today's Prophecy</div>
        <div class="prophecy-text">${s.prophecy||''}</div>
      </div>`;
  }

  function openModal(key) {
    const sign = SIGNS.find(s=>s.key===key);
    const s    = horoscopeData.signs[key];
    if (!sign||!s) return;
    document.getElementById('modal-content').innerHTML = buildModal(sign, s);
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

  async function load() {
    const today = new Date().toLocaleDateString('en-CA');
    document.getElementById('date-display').textContent =
      new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

    try {
      const res = await fetch(`data/${today}.json`);
      if (!res.ok) throw new Error('not found');
      horoscopeData = await res.json();

      const grid = document.getElementById('grid');
      grid.innerHTML = SIGNS.map(sign => {
        const s = horoscopeData.signs[sign.key];
        return s ? buildCompactCard(sign, s) : '';
      }).join('');
    } catch {
      document.getElementById('no-data').style.display = 'block';
    }
  }

  load();
</script>
</body>
</html>
